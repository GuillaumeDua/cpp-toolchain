services:
  cpp-toolchain-dev:
    container_name: cpp-toolchain-dev
    image: cpp-toolchain:dev # so the opt-in ssh_support layer can build FROM it
    build:
      context: .. # repo root: the Dockerfile + scripts/ live there, not in .devcontainer
      dockerfile: Dockerfile
      target: dev # multi-stage: full dev image (runtime ⊂ build ⊂ dev)
      args:
        BASE_IMAGE: 'ubuntu:latest'
        CMAKE_VERSION: 'latest'
        GCC_VERSIONS: 'latest-stable'
        LLVM_VERSIONS: 'latest-stable'
        # Cross-arch toolchains, off by default (normal/lean image).
        # For a local cross-arch build, set a space-separated triplet list, e.g. 'aarch64-linux-gnu arm-linux-gnueabihf riscv64-linux-gnu'.
        BINUTILS_TARGETS: ''
        OPT_IN_INTEGRATE_BAZEL: no
        OPT_IN_INTEGRATE_BUILD2: no
    volumes:
      - ..:/workspace
    # network_mode: host
    # Required for ptrace-based debuggers like C++, Go, and Rust
    cap_add:
      - SYS_PTRACE
    security_opt:
      - seccomp:unconfined

  # Opt-in: SSH remote access on top of cpp-toolchain-dev. Build & run explicitly:
  #   docker compose --profile ssh build ssh_support
  #   docker compose --profile ssh run --service-ports ssh_support
  ssh_support:
    profiles: ["ssh"]
    container_name: cpp-toolchain-dev_ssh-support
    depends_on:
      - cpp-toolchain-dev
    build:
      context: .
      dockerfile: ./ssh_support.dockerfile
      args:
        BASE_IMAGE: 'cpp-toolchain:dev'
        USER_NAME: 'vscodeuser'
        USER_PASSWORD: 'password'
    ports:
      - "2222:22"
    volumes:
      - ..:/workspace
    cap_add:
      - SYS_PTRACE
    security_opt:
      - seccomp:unconfined
