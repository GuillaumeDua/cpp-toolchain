name: docker-build

# Gate: every PR to main (and every push to main) must still produce (not publish !) all five images.
#
# Deliberately NOT path-filtered: this is meant to be a required status check,
# and a path-filtered workflow that never runs leaves the PR waiting forever on a check that never reports.
# When the Dockerfile/scripts are untouched the gha cache makes this a near-no-op.
#
# Nothing is pushed here, so no registry credentials are needed,
# and the gate also works for pull requests coming from forks (which have no access to secrets).
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Built in dependency order on a single buildx builder:
      #   the heavy `build` layer is produced once and reused by static-analysis / documentation / dev.
      # Both image variants are gated: normal/lean (BINUTILS_TARGETS='') and cross-arch (a triplet list), so a break in either is caught.
      # Caching keeps the cross pass to just the tail binutils layer.
      - name: Build all stages (no push)
        run: |
          set -euo pipefail

          # Cross-arch target triplets for the cross-arch variant (single source of truth).
          CROSS_TARGETS="x86-64-linux-gnu aarch64-linux-gnu arm-linux-gnueabihf riscv64-linux-gnu"

          # Build one variant (no push). $1=BINUTILS_TARGETS build-arg, $2.. = stages.
          build_variant() {
            local targets="$1"; shift
            for target in "$@"; do
              echo "::group::build cpp-toolchain:${target} [BINUTILS_TARGETS='${targets}']"
              docker buildx build \
                --file Dockerfile \
                --target "${target}" \
                --build-arg "BINUTILS_TARGETS=${targets}" \
                --cache-from type=gha,scope=cpp-toolchain \
                .
              echo "::endgroup::"
            done
          }

          # Normal variant first (populates the shared cache); `runtime` has no cross variant.
          build_variant ""                 runtime build static-analysis documentation dev
          build_variant "${CROSS_TARGETS}" build static-analysis documentation dev
