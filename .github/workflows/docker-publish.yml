name: docker-publish

on:
  push:
    branches: [main]
    paths:
      - ".devcontainer/Dockerfile"
      - ".devcontainer/scripts/**"
      - ".github/workflows/docker-publish.yml"
  schedule:
    - cron: "0 4 * * 6" # weekly, Saturday 4am UTC
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  build-and-push:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Single job, built in dependency order on one buildx builder:
      # the heavy `build` layer is produced once and reused by its downstream stages
      # (a parallel matrix would rebuild it for static-analysis / documentation / dev).
      # A shared gha cache scope persists layers across runs.
      - name: Build and push all stages
        run: |
          set -euo pipefail
          for target in runtime build static-analysis documentation dev; do
            echo "::group::build+push cpp-toolchain-${target}"
            docker buildx build \
              --file .devcontainer/Dockerfile \
              --target "${target}" \
              --tag "guillaumedua/cpp-toolchain-${target}:latest" \
              --tag "guillaumedua/cpp-toolchain-${target}:${{ github.run_number }}" \
              --cache-from type=gha,scope=cpp-toolchain \
              --cache-to type=gha,mode=max,scope=cpp-toolchain \
              --push \
              .devcontainer
            echo "::endgroup::"
          done
