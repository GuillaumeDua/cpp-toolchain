name: docker-publish

on:
  push:
    branches: [main]
    paths:
      - ".devcontainer/Dockerfile"
      - ".devcontainer/scripts/**"
      - ".github/workflows/docker-publish.yml"
  schedule:
    - cron: "0 4 * * 6" # weekly, Saturday 4am UTC
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  build-and-push:
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        # multi-stage targets, each published as its own Docker Hub repo
        target: [runtime, build, dev]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push (${{ matrix.target }})
        uses: docker/build-push-action@v6
        with:
          context: .devcontainer
          file: .devcontainer/Dockerfile
          target: ${{ matrix.target }}
          push: true
          tags: |
            guillaumedua/cpp-toolchain-${{ matrix.target }}:latest
            guillaumedua/cpp-toolchain-${{ matrix.target }}:${{ github.run_number }}
          cache-from: type=gha,scope=${{ matrix.target }}
          cache-to: type=gha,mode=max,scope=${{ matrix.target }}
