name: docker-publish

# Publishing rules:
#   - all five stages live in the single `cpp-toolchain` repository, stage-prefixed: `<stage>-<tag>` (e.g. build-v1.0)
#   - each toolchain stage ships in two variants: normal/lean (default tags) and cross-arch (`<stage>-cross-<tag>`);
#     `runtime` has no toolchain, so it is published once (no cross variant)
#   - `dev` is the Dockerfile's default target, so it also owns the unprefixed aliases
#     (v1.0, latest, experimental, and cross-v1.0 / cross-latest / cross-experimental for the cross-arch variant)
#   - a GitHub release (cut from main) publishes the release tag (e.g. v1.0) + the `latest` alias
#   - the weekly schedule publishes `experimental` only: `latest` never moves outside a release
#   - images go to both Docker Hub and GHCR (ghcr.io has no pull rate limit for public images,
#     which matters since these images are meant to be consumed by other projects' CI)
on:
  release:
    types: [published]
  schedule:
    - cron: "0 4 * * 6" # weekly, Saturday 4am UTC -> `experimental`
  workflow_dispatch: {} # manual -> `experimental`

permissions:
  contents: read
  packages: write # GHCR

jobs:
  build-and-push:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # need history to assert the built commit is contained in main

      # The release tag is used verbatim as the image tag,
      # so reject anything that is not `v<major>.<minor>` (e.g. v1.0) before it can be published next to the `latest` alias.
      #   NB: the tag is untrusted input -> passed via env, never interpolated into the script.
      - name: Assert release tag format
        if: github.event_name == 'release'
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          set -euo pipefail
          if [[ ! "${RELEASE_TAG}" =~ ^v[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Release tag '${RELEASE_TAG}' is malformed - expected v<major>.<minor>, e.g. v1.0."
            exit 1
          fi
          echo "Release tag '${RELEASE_TAG}' is well-formed."

      # Publish from main only: a release/tag can be cut from any commit, so verify the commit being built is actually contained in main before pushing anything.
      # Covers release, schedule (always main) and workflow_dispatch (could be triggered from any branch).
      - name: Assert we are publishing from main
        run: |
          set -euo pipefail
          git fetch --quiet origin main
          if ! git merge-base --is-ancestor "${GITHUB_SHA}" origin/main; then
            echo "::error::${GITHUB_SHA} is not contained in main - refusing to publish."
            exit 1
          fi

      - name: Resolve image tags
        id: meta
        env:
          EVENT_NAME: ${{ github.event_name }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          set -euo pipefail
          if [ "${EVENT_NAME}" = "release" ]; then
            # image tag == the GitHub release tag (validated above), plus the `latest` alias
            echo "tags=${RELEASE_TAG} latest" >> "$GITHUB_OUTPUT"
          else
            # scheduled / manual rebuilds are never `latest`
            echo "tags=experimental" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Single job, built in dependency order on one buildx builder:
      #   the heavy `build` layer is produced once and reused by static-analysis / documentation / dev
      # A shared gha cache scope persists layers across runs.
      - name: Build and push all stages
        env:
          TAGS: ${{ steps.meta.outputs.tags }}
        run: |
          set -euo pipefail

          # Cross-arch target triplets for the `-cross` image variant (single source of truth).
          CROSS_TARGETS="x86-64-linux-gnu aarch64-linux-gnu arm-linux-gnueabihf riscv64-linux-gnu"

          # Build + push one variant. $1=BINUTILS_TARGETS build-arg, $2=tag infix, $3.. = stages.
          #   infix ""       -> normal / lean:  <stage>-<tag>        (+ unprefixed <tag> for dev)
          #   infix "cross-" -> cross-arch:     <stage>-cross-<tag>  (+ unprefixed cross-<tag> for dev)
          build_variant() {
            local targets="$1" infix="$2"; shift 2
            for target in "$@"; do
              local tag_args=()
              for registry in docker.io/guillaumedua ghcr.io/guillaumedua; do
                for tag in ${TAGS}; do
                  tag_args+=(--tag "${registry}/cpp-toolchain:${target}-${infix}${tag}")
                  # `dev` is what `docker build` produces without --target, so it also answers to the unprefixed tag
                  if [ "${target}" = "dev" ]; then
                    tag_args+=(--tag "${registry}/cpp-toolchain:${infix}${tag}")
                  fi
                done
              done

              echo "::group::build+push cpp-toolchain:${target}-${infix}* [${TAGS}]"
              docker buildx build \
                --file Dockerfile \
                --target "${target}" \
                --build-arg "BINUTILS_TARGETS=${targets}" \
                "${tag_args[@]}" \
                --cache-from type=gha,scope=cpp-toolchain \
                --cache-to type=gha,mode=max,scope=cpp-toolchain \
                --push \
                .
              echo "::endgroup::"
            done
          }

          # Normal variant first, so its shared toolchain layers populate the gha cache the cross pass reuses.
          #   `runtime` carries no toolchain, so it gets no cross variant (a cross runtime would be byte-identical).
          build_variant ""                 ""        runtime build static-analysis documentation dev
          build_variant "${CROSS_TARGETS}" "cross-"  build static-analysis documentation dev
